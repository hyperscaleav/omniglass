components:
  schemas:
    AuthStatusOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/AuthStatusOutputBody.json
          format: uri
          readOnly: true
          type: string
        bootstrapped:
          type: boolean
      required:
        - bootstrapped
      type: object
    ChangePasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ChangePasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        current_password:
          description: Your current password
          type: string
        new_password:
          description: The new password (at least 8 characters)
          maxLength: 256
          minLength: 8
          type: string
      required:
        - current_password
        - new_password
      type: object
    ComponentBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ComponentBody.json
          format: uri
          readOnly: true
          type: string
        component_type:
          type: string
        display_name:
          type: string
        id:
          type: string
        location_id:
          type: string
        name:
          type: string
        parent_id:
          type: string
        system_id:
          type: string
      required:
        - id
        - name
        - component_type
      type: object
    CreateComponentInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateComponentInputBody.json
          format: uri
          readOnly: true
          type: string
        component_type:
          description: A component_type id
          minLength: 1
          type: string
        display_name:
          type: string
        location:
          description: Location name this component is placed at
          type: string
        name:
          description: Globally unique name (the address)
          minLength: 1
          type: string
        parent:
          description: Parent component name; omit for a root component
          type: string
        system:
          description: Primary system name this component belongs to
          type: string
      required:
        - name
        - component_type
      type: object
    CreateGrantInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateGrantInputBody.json
          format: uri
          readOnly: true
          type: string
        role:
          description: A role id (viewer, operator, admin, owner, or a custom role)
          minLength: 1
          type: string
        scope_id:
          description: The scope root id; omit for the all scope
          type: string
        scope_kind:
          description: The scope kind; 'all' confers the whole estate
          enum:
            - all
            - location
            - system
            - component
            - group
          type: string
      required:
        - role
        - scope_kind
      type: object
    CreateLocationInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateLocationInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location_type:
          description: A location_type id (campus, building, ...)
          minLength: 1
          type: string
        name:
          description: Globally unique name (the address)
          minLength: 1
          type: string
        parent:
          description: Parent location name; omit for a root location
          type: string
      required:
        - name
        - location_type
      type: object
    CreatePrincipalInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreatePrincipalInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          maxLength: 200
          type: string
        email:
          maxLength: 320
          type: string
        password:
          description: Optional initial password; the user changes it after signing in
          maxLength: 256
          minLength: 8
          type: string
        username:
          description: Unique sign-in name
          maxLength: 200
          minLength: 1
          type: string
      required:
        - username
      type: object
    CreateSystemInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateSystemInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location:
          description: Location name this system is placed at
          type: string
        name:
          description: Globally unique name (the address)
          minLength: 1
          type: string
        parent:
          description: Parent system name; omit for a root system
          type: string
        system_type:
          description: A system_type id
          minLength: 1
          type: string
      required:
        - name
        - system_type
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    GrantBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/GrantBody.json
          format: uri
          readOnly: true
          type: string
        id:
          type: string
        role:
          type: string
        scope_id:
          type: string
        scope_kind:
          type: string
      required:
        - role
        - scope_kind
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        db:
          description: "Database leg via the Storage Gateway: ok or down"
          type: string
        status:
          description: "Overall health: ok when all legs pass, degraded otherwise"
          type: string
      required:
        - status
        - db
      type: object
    HumanBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/HumanBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        email:
          type: string
        username:
          type: string
      required:
        - username
      type: object
    ListComponentsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ListComponentsOutputBody.json
          format: uri
          readOnly: true
          type: string
        components:
          items:
            $ref: "#/components/schemas/ComponentBody"
          type:
            - array
            - "null"
      required:
        - components
      type: object
    ListLocationTypesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ListLocationTypesOutputBody.json
          format: uri
          readOnly: true
          type: string
        location_types:
          items:
            $ref: "#/components/schemas/LocationTypeBody"
          type:
            - array
            - "null"
      required:
        - location_types
      type: object
    ListLocationsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ListLocationsOutputBody.json
          format: uri
          readOnly: true
          type: string
        locations:
          items:
            $ref: "#/components/schemas/LocationBody"
          type:
            - array
            - "null"
      required:
        - locations
      type: object
    ListPrincipalsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ListPrincipalsOutputBody.json
          format: uri
          readOnly: true
          type: string
        principals:
          items:
            $ref: "#/components/schemas/PrincipalBody"
          type:
            - array
            - "null"
      required:
        - principals
      type: object
    ListSystemsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ListSystemsOutputBody.json
          format: uri
          readOnly: true
          type: string
        systems:
          items:
            $ref: "#/components/schemas/SystemBody"
          type:
            - array
            - "null"
      required:
        - systems
      type: object
    LocationBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/LocationBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        id:
          type: string
        location_type:
          type: string
        name:
          type: string
        parent_id:
          type: string
      required:
        - id
        - name
        - location_type
      type: object
    LocationTypeBody:
      additionalProperties: false
      properties:
        display_name:
          type: string
        id:
          type: string
        official:
          type: boolean
        rank:
          format: int64
          type: integer
      required:
        - id
        - display_name
        - rank
        - official
      type: object
    LoginInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
      type: object
    MeOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/MeOutputBody.json
          format: uri
          readOnly: true
          type: string
        grants:
          items:
            $ref: "#/components/schemas/GrantBody"
          type:
            - array
            - "null"
        human:
          $ref: "#/components/schemas/HumanBody"
        permissions:
          items:
            type: string
          type:
            - array
            - "null"
        principal:
          $ref: "#/components/schemas/PrincipalStruct"
        service:
          $ref: "#/components/schemas/SvcBody"
      required:
        - principal
        - permissions
        - grants
      type: object
    PrincipalBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/PrincipalBody.json
          format: uri
          readOnly: true
          type: string
        active:
          type: boolean
        grants:
          items:
            $ref: "#/components/schemas/GrantBody"
          type:
            - array
            - "null"
        human:
          $ref: "#/components/schemas/HumanBody"
        id:
          type: string
        kind:
          type: string
        service:
          $ref: "#/components/schemas/SvcBody"
      required:
        - id
        - kind
        - active
        - grants
      type: object
    PrincipalStruct:
      additionalProperties: false
      properties:
        id:
          type: string
        kind:
          type: string
      required:
        - id
        - kind
      type: object
    RoleBody:
      additionalProperties: false
      properties:
        id:
          type: string
        inherits:
          items:
            type: string
          type:
            - array
            - "null"
        official:
          type: boolean
        permissions:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - id
        - official
        - permissions
        - inherits
      type: object
    RolesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/RolesOutputBody.json
          format: uri
          readOnly: true
          type: string
        roles:
          items:
            $ref: "#/components/schemas/RoleBody"
          type:
            - array
            - "null"
      required:
        - roles
      type: object
    SvcBody:
      additionalProperties: false
      properties:
        label:
          type: string
      required:
        - label
      type: object
    SystemBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/SystemBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        id:
          type: string
        location_id:
          type: string
        name:
          type: string
        parent_id:
          type: string
        system_type:
          type: string
      required:
        - id
        - name
        - system_type
      type: object
    UpdateComponentInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateComponentInputBody.json
          format: uri
          readOnly: true
          type: string
        component_type:
          type: string
        display_name:
          type: string
      type: object
    UpdateLocationInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateLocationInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location_type:
          type: string
      type: object
    UpdateMeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateMeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          description: Your display name; empty clears it
          maxLength: 200
          type: string
      type: object
    UpdatePrincipalInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdatePrincipalInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          description: Display name; empty clears it
          maxLength: 200
          type: string
        email:
          description: Email; empty clears it
          maxLength: 320
          type: string
        username:
          description: Sign-in name; renaming is safe
          maxLength: 200
          minLength: 1
          type: string
      type: object
    UpdateSystemInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateSystemInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        system_type:
          type: string
      type: object
info:
  title: Omniglass
  version: 0.0.1-skeleton
openapi: 3.1.0
paths:
  /auth/login:
    post:
      description: Verifies a human's password and sets an httpOnly session cookie. Public; a bad credential is a flat 401, and a correct password against a disabled account is a distinct 403 so the screen can explain it.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Log in with a username and password
  /auth/logout:
    post:
      description: Revokes the session token and clears the cookie. Public.
      operationId: logout
      parameters:
        - in: header
          name: Cookie
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log out the current session
  /auth/me:
    get:
      description: Returns the caller's principal, flattened permissions (a UI hint and the fast-reject set), and grants. Requires authentication.
      operationId: get-auth-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: The authenticated principal, its permissions, and grants
    patch:
      description: Updates the caller's own display name (email is administrator-set). Requires authentication; self-scoped (edits only your own principal).
      operationId: update-auth-me
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update your own profile
  /auth/me:changePassword:
    post:
      description: Verifies the current password and sets a new one. Requires authentication; self-scoped.
      operationId: change-auth-me-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Change your own password
  /auth/status:
    get:
      description: "Public: reports whether any owner has been bootstrapped, so the login screen can hide the bootstrap hint."
      operationId: get-auth-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Whether the system has an owner yet
  /components:
    get:
      description: Lists the components the caller may read, each filtered to its scope subtree. Gated by component:read.
      operationId: list-components
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List components in scope
    post:
      description: Creates a component, optionally under a parent (a root needs an all-scoped grant), bound to a system and a location. Gated by component:create.
      operationId: create-component
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComponentInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a component
  /components/{name}:
    delete:
      description: Deletes a component, refused while it still has child components. Gated by component:delete; read and delete scopes drive the 404 versus 403 split.
      operationId: delete-component
      parameters:
        - description: The component's unique name
          in: path
          name: name
          required: true
          schema:
            description: The component's unique name
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a component
    get:
      description: Fetches a component by name within the caller's read scope. Out of scope is a non-disclosing 404. Gated by component:read.
      operationId: get-component
      parameters:
        - description: The component's unique name
          in: path
          name: name
          required: true
          schema:
            description: The component's unique name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a component
    patch:
      description: Patches a component's display_name or component_type. Gated by component:update; read and update scopes drive the 404 versus 403 split.
      operationId: update-component
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComponentInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a component
  /healthz:
    get:
      description: Reports process health and the database leg, pinged through the Storage Gateway.
      operationId: get-healthz
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Liveness and database-reachability probe
  /location-types:
    get:
      description: Lists the location_type registry (the shape-definers a location is classified by), ordered by rank. Populates the type picker on the location form. Gated by location:read.
      operationId: list-location-types
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLocationTypesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List location types
  /locations:
    get:
      description: Lists the locations the caller may read, each filtered to its scope subtree. Gated by location:read.
      operationId: list-locations
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLocationsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List locations in scope
    post:
      description: Creates a location, optionally under a parent (a root needs an all-scoped grant). Gated by location:create.
      operationId: create-location
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a location
  /locations/{name}:
    delete:
      description: Deletes a location, refused while it still has child locations. Gated by location:delete; read and delete scopes drive the 404 versus 403 split.
      operationId: delete-location
      parameters:
        - description: The location's unique name
          in: path
          name: name
          required: true
          schema:
            description: The location's unique name
            type: string
      responses:
        "204":
          description: No Content
