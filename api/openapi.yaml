components:
  schemas:
    AddMemberInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/AddMemberInputBody.json
          format: uri
          readOnly: true
          type: string
        principal_id:
          description: The principal to add to the group
          minLength: 1
          type: string
      required:
        - principal_id
      type: object
    AuditEventBody:
      additionalProperties: false
      properties:
        actor:
          type: string
        actor_name:
          type: string
        id:
          type: string
        real_actor:
          type: string
        real_actor_name:
          type: string
        resource:
          type: string
        resource_id:
          type: string
        ts:
          type: string
        verb:
          type: string
      required:
        - id
        - ts
        - verb
        - resource
      type: object
    AuditListOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/AuditListOutputBody.json
          format: uri
          readOnly: true
          type: string
        events:
          items:
            $ref: "#/components/schemas/AuditEventBody"
          type:
            - array
            - "null"
      required:
        - events
      type: object
    AuthStatusOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/AuthStatusOutputBody.json
          format: uri
          readOnly: true
          type: string
        bootstrapped:
          type: boolean
      required:
        - bootstrapped
      type: object
    AvatarOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/AvatarOutputBody.json
          format: uri
          readOnly: true
          type: string
        image_base64:
          description: The profile picture as a base64-encoded 256x256 JPEG
          type: string
      required:
        - image_base64
      type: object
    ChangePasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ChangePasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        current_password:
          description: Your current password
          type: string
        new_password:
          description: The new password (at least 12 characters, not a common password, not containing the username)
          maxLength: 256
          minLength: 12
          type: string
      required:
        - current_password
        - new_password
      type: object
    ComponentBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ComponentBody.json
          format: uri
          readOnly: true
          type: string
        actions:
          description: The scope-aware actions the caller may perform on this row (create a child, update, delete); a UI hint, the server still enforces.
          items:
            type: string
          type:
            - array
            - "null"
        component_type:
          type: string
        display_name:
          type: string
        effective_tags:
          additionalProperties:
            type: string
          description: The resolved effective tags (key -> winning value) that cascade onto this component; for the Tags column. Provenance is in the effective-tags detail view.
          type: object
        id:
          type: string
        location_id:
          type: string
        name:
          type: string
        parent_id:
          type: string
        system_id:
          type: string
      required:
        - id
        - name
        - component_type
      type: object
    ComponentTypeBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ComponentTypeBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        id:
          type: string
        official:
          type: boolean
      required:
        - id
        - display_name
        - official
      type: object
    CreateComponentInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateComponentInputBody.json
          format: uri
          readOnly: true
          type: string
        component_type:
          description: A component_type id
          minLength: 1
          type: string
        display_name:
          type: string
        location:
          description: Location name this component is placed at
          type: string
        name:
          description: Globally unique name (the address)
          minLength: 1
          type: string
        parent:
          description: Parent component name; omit for a root component
          type: string
        system:
          description: Primary system name this component belongs to
          type: string
      required:
        - name
        - component_type
      type: object
    CreateComponentTypeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateComponentTypeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          minLength: 1
          type: string
        id:
          description: Globally unique type id
          minLength: 1
          type: string
      required:
        - id
        - display_name
      type: object
    CreateFileInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateFileInputBody.json
          format: uri
          readOnly: true
          type: string
        content:
          description: The file bytes, base64-encoded
          type: string
        content_type:
          description: The MIME type used to serve the file
          minLength: 1
          type: string
        name:
          description: The file's display name (a label, no path separators)
          minLength: 1
          type: string
        sensitive:
          description: Admin-only visibility; defaults false. Setting true requires the admin tier
          type: boolean
      required:
        - name
        - content_type
        - content
      type: object
    CreateGrantInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateGrantInputBody.json
          format: uri
          readOnly: true
          type: string
        role:
          description: A role id (viewer, operator, admin, owner, or a custom role)
          minLength: 1
          type: string
        scope_id:
          description: The scope root id; omit for the all scope
          type: string
        scope_kind:
          description: The scope kind; 'all' confers the whole estate
          enum:
            - all
            - location
            - system
            - component
            - group
          type: string
        scope_op:
          description: "How the scope root matches the tree: subtree (root + descendants, the default), subtree_excl_root (descendants only for update/delete, root kept for read/create), or self (the root row only). Moot for the all scope."
          enum:
            - subtree
            - subtree_excl_root
            - self
          type: string
      required:
        - role
        - scope_kind
      type: object
    CreateGroupGrantInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateGroupGrantInputBody.json
          format: uri
          readOnly: true
          type: string
        role:
          description: A role id (viewer, operator, admin, owner, or a custom role)
          minLength: 1
          type: string
        scope_id:
          description: The scope root id; omit for the all scope
          type: string
        scope_kind:
          description: The scope kind; 'all' confers the whole estate
          enum:
            - all
            - location
            - system
            - component
            - group
          type: string
        scope_op:
          description: How the scope root matches the tree; moot for the all scope
          enum:
            - subtree
            - subtree_excl_root
            - self
          type: string
      required:
        - role
        - scope_kind
      type: object
    CreateGroupInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateGroupInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          maxLength: 1000
          type: string
        display_name:
          maxLength: 200
          type: string
        name:
          description: Unique group name (lowercase letters, digits, and . _ -)
          maxLength: 200
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9._-]*$
          type: string
      required:
        - name
      type: object
    CreateLocationInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateLocationInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location_type:
          description: A location_type id (campus, building, ...)
          minLength: 1
          type: string
        name:
          description: Globally unique name (the address)
          minLength: 1
          type: string
        parent:
          description: Parent location name; omit for a root location
          type: string
      required:
        - name
        - location_type
      type: object
    CreateLocationTypeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateLocationTypeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          minLength: 1
          type: string
        icon:
          description: A glyph key; the console falls back to map-pin when empty
          type: string
        id:
          description: Globally unique type id (kebab, e.g. wing)
          minLength: 1
          type: string
      required:
        - id
        - display_name
      type: object
    CreateMeTokenInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateMeTokenInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          description: What the token is for (required)
          maxLength: 200
          minLength: 1
          type: string
        ttl_days:
          description: Days until the token expires (default 90, maximum 365)
          format: int64
          maximum: 365
          minimum: 1
          type: integer
      required:
        - description
      type: object
    CreateMeTokenOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateMeTokenOutputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          description: What the token is for
          type: string
        expires_at:
          description: When the token expires (RFC 3339)
          type: string
        prefix:
          description: The non-secret ogp locator for the new token
          type: string
        token:
          description: "The bearer token, shown once. Store it now: it cannot be retrieved again."
          type: string
      required:
        - token
        - prefix
        - description
        - expires_at
      type: object
    CreatePrincipalInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreatePrincipalInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          maxLength: 200
          type: string
        email:
          format: email
          maxLength: 320
          type: string
        password:
          description: Optional initial password (at least 12 characters, not a common password, not containing the username); the user changes it after signing in
          maxLength: 256
          minLength: 12
          type: string
        username:
          description: Unique sign-in name (lowercase letters, digits, and . _ -)
          maxLength: 200
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9._-]*$
          type: string
      required:
        - username
      type: object
    CreateSecretInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateSecretInputBody.json
          format: uri
          readOnly: true
          type: string
        admin_sensitive:
          description: Admin-only visibility; omit to use the type default. Setting true requires the admin tier
          type: boolean
        fields:
          additionalProperties:
            type: string
          description: The operator field map, validated against the type shape
          type: object
        name:
          description: The cascade key; unique per owner
          minLength: 1
          type: string
        owner:
          description: The owning entity's name; omit for a global secret
          type: string
        owner_kind:
          description: Which tier owns this secret
          enum:
            - global
            - location
            - system
            - component
          type: string
        secret_type:
          description: A secret_type id
          minLength: 1
          type: string
      required:
        - name
        - secret_type
        - owner_kind
        - fields
      type: object
    CreateSystemInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateSystemInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location:
          description: Location name this system is placed at
          type: string
        name:
          description: Globally unique name (the address)
          minLength: 1
          type: string
        parent:
          description: Parent system name; omit for a root system
          type: string
        system_type:
          description: A system_type id
          minLength: 1
          type: string
      required:
        - name
        - system_type
      type: object
    CreateSystemTypeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateSystemTypeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          minLength: 1
          type: string
        id:
          description: Globally unique type id
          minLength: 1
          type: string
      required:
        - id
        - display_name
      type: object
    CreateTagInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateTagInputBody.json
          format: uri
          readOnly: true
          type: string
        allowed_values:
          description: The value enum a bound value must belong to; omit for free text
          items:
            type: string
          type:
            - array
            - "null"
        applies_to:
          description: Entity kinds this key may bind to (component, system, location); omit for universal
          items:
            type: string
          type:
            - array
            - "null"
        name:
          description: "The normalized key: a lowercase identifier, unique tenant-wide"
          minLength: 1
          type: string
        propagates:
          description: Whether bindings cascade to descendants; defaults true
          type: boolean
      required:
        - name
      type: object
    CreateVariableInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/CreateVariableInputBody.json
          format: uri
          readOnly: true
          type: string
        name:
          description: The cascade key; unique per owner
          minLength: 1
          type: string
        owner:
          description: The owning entity's name; omit for a global variable
          type: string
        owner_kind:
          description: Which tier owns this variable
          enum:
            - global
            - location
            - system
            - component
          type: string
        value:
          description: The value, validated against value_type
        value_type:
          description: The declared value type
          enum:
            - string
            - int
            - float
            - bool
            - json
          type: string
      required:
        - name
        - value_type
        - owner_kind
        - value
      type: object
    DownloadFileOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/DownloadFileOutputBody.json
          format: uri
          readOnly: true
          type: string
        content:
          description: The file bytes, base64-encoded
          type: string
        content_type:
          type: string
        name:
          type: string
      required:
        - name
        - content_type
        - content
      type: object
    EffectiveSecretsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/EffectiveSecretsOutputBody.json
          format: uri
          readOnly: true
          type: string
        secrets:
          items:
            $ref: "#/components/schemas/ResolvedSecretBody"
          type:
            - array
            - "null"
      required:
        - secrets
      type: object
    EffectiveTagsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/EffectiveTagsOutputBody.json
          format: uri
          readOnly: true
          type: string
        tags:
          items:
            $ref: "#/components/schemas/ResolvedTagBody"
          type:
            - array
            - "null"
      required:
        - tags
      type: object
    EffectiveVariablesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/EffectiveVariablesOutputBody.json
          format: uri
          readOnly: true
          type: string
        variables:
          items:
            $ref: "#/components/schemas/ResolvedVariableBody"
          type:
            - array
            - "null"
      required:
        - variables
      type: object
    EntityRemoveTagInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/EntityRemoveTagInputBody.json
          format: uri
          readOnly: true
          type: string
        key:
          description: The tag key to remove
          minLength: 1
          type: string
      required:
        - key
      type: object
    EntitySetTagInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/EntitySetTagInputBody.json
          format: uri
          readOnly: true
          type: string
        key:
          description: The tag key (must exist and apply to this kind)
          minLength: 1
          type: string
        value:
          description: The bound value
          minLength: 1
          type: string
      required:
        - key
        - value
      type: object
    EntityTagsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/EntityTagsOutputBody.json
          format: uri
          readOnly: true
          type: string
        tags:
          items:
            $ref: "#/components/schemas/TagBindingBody"
          type:
            - array
            - "null"
      required:
        - tags
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    FileBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/FileBody.json
          format: uri
          readOnly: true
          type: string
        content_type:
          type: string
        created_at:
          type: string
        id:
          type: string
        name:
          type: string
        sensitive:
          description: When true, only the admin tier may see or download this file
          type: boolean
        sha256:
          description: The content hash of the blob this handle points at
          type: string
        size:
          format: int64
          type: integer
      required:
        - id
        - name
        - content_type
        - size
        - sha256
        - sensitive
        - created_at
      type: object
    GlobalBindingInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/GlobalBindingInputBody.json
          format: uri
          readOnly: true
          type: string
        value:
          description: The bound value
          minLength: 1
          type: string
      required:
        - value
      type: object
    GrantBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/GrantBody.json
          format: uri
          readOnly: true
          type: string
        group_id:
          description: Set when this grant is inherited from a group the principal belongs to (the group's id); absent for a direct grant, which is the only kind revocable from the principal.
          type: string
        group_name:
          description: The source group's label, present when the grant is inherited.
          type: string
        id:
          type: string
        role:
          type: string
        scope_id:
          type: string
        scope_kind:
          type: string
        scope_op:
          description: "How the scope root matches the tree: subtree (root + descendants), subtree_excl_root (descendants only for update/delete, root kept for read/create), or self (the root row only). Empty means subtree. Moot for the all scope."
          enum:
            - subtree
            - subtree_excl_root
            - self
          type: string
      required:
        - role
        - scope_kind
      type: object
    GroupBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/GroupBody.json
          format: uri
          readOnly: true
          type: string
        description:
          type: string
        display_name:
          type: string
        grant_count:
          description: How many grants the group confers on its members.
          format: int64
          type: integer
        id:
          type: string
        member_count:
          description: How many principals belong to the group (populated on list and get; 0 from create/update).
          format: int64
          type: integer
        name:
          type: string
      required:
        - id
        - name
        - member_count
        - grant_count
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        db:
          description: "Database leg via the Storage Gateway: ok or down"
          type: string
        status:
          description: "Overall health: ok when all legs pass, degraded otherwise"
          type: string
      required:
        - status
        - db
      type: object
    HumanBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/HumanBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        email:
          type: string
        has_avatar:
          description: True when the principal has a profile picture; fetch it from the avatar endpoint.
          type: boolean
        must_change_password:
          description: True when an admin reset the password and the user must change it before doing anything else; the console gates every route to the change-password form until it clears.
          type: boolean
        username:
          type: string
      required:
        - username
      type: object
    ImpersonateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ImpersonateInputBody.json
          format: uri
          readOnly: true
          type: string
        duration_minutes:
