        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/LoginInputBody.json
          format: uri
          readOnly: true
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
      type: object
    MeOutputBody:
      additionalProperties: false
