    TagBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/TagBody.json
          format: uri
          readOnly: true
          type: string
        allowed_values:
          description: The value enum a bound value must belong to; empty means free text
          items:
            type: string
          type:
            - array
            - "null"
        applies_to:
          description: Entity kinds this key may bind to; empty means universal
          items:
            type: string
          type:
            - array
            - "null"
        id:
          type: string
        name:
          type: string
        propagates:
          description: Whether a bound value cascades to descendants
          type: boolean
      required:
        - id
        - name
        - applies_to
        - propagates
        - allowed_values
      type: object
    TagValuesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/TagValuesOutputBody.json
          format: uri
          readOnly: true
          type: string
        values:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - values
      type: object
    UpdateComponentInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateComponentInputBody.json
          format: uri
          readOnly: true
          type: string
        component_type:
          type: string
        display_name:
          type: string
      type: object
    UpdateComponentTypeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateComponentTypeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
      type: object
    UpdateGroupInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateGroupInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          description: Description; empty clears it
          maxLength: 1000
          type: string
        display_name:
          description: Display name; empty clears it
          maxLength: 200
          type: string
        name:
          description: Group name (lowercase letters, digits, and . _ -); renaming is safe
          maxLength: 200
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9._-]*$
          type: string
      type: object
    UpdateLocationInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateLocationInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location_type:
          type: string
      type: object
    UpdateLocationTypeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateLocationTypeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        icon:
          type: string
      type: object
    UpdateMeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateMeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          description: Your display name; empty clears it
          maxLength: 200
          type: string
      type: object
    UpdatePrincipalInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdatePrincipalInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          description: Display name; empty clears it
          maxLength: 200
          type: string
        email:
          description: Email; empty clears it
          maxLength: 320
          type: string
        username:
          description: Sign-in name (lowercase letters, digits, and . _ -); renaming is safe
          maxLength: 200
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9._-]*$
          type: string
      type: object
    UpdateSecretInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateSecretInputBody.json
          format: uri
          readOnly: true
          type: string
        fields:
          additionalProperties:
            type: string
          description: The field values to replace; an omitted field keeps its value
          type: object
      required:
        - fields
      type: object
    UpdateSystemInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateSystemInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        system_type:
          type: string
      type: object
    UpdateSystemTypeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateSystemTypeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
      type: object
    UpdateTagInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateTagInputBody.json
          format: uri
          readOnly: true
          type: string
        allowed_values:
          description: The value enum a bound value must belong to; omit for free text
          items:
            type: string
          type:
            - array
            - "null"
        applies_to:
          description: Entity kinds this key may bind to; omit for universal
          items:
            type: string
          type:
            - array
            - "null"
        propagates:
          description: Whether bindings cascade to descendants; defaults true
          type: boolean
      type: object
    UpdateVariableInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateVariableInputBody.json
          format: uri
          readOnly: true
          type: string
        value:
          description: The new value, validated against the fixed value_type
      required:
        - value
      type: object
    VariableBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/VariableBody.json
          format: uri
          readOnly: true
          type: string
        id:
          type: string
        name:
          type: string
        owner_id:
          type: string
        owner_kind:
          type: string
        owner_name:
          type: string
        value:
          description: The value, shape given by value_type
        value_type:
          type: string
      required:
        - id
        - name
        - value_type
        - owner_kind
        - value
      type: object
info:
  title: Omniglass
  version: 0.0.1-skeleton
openapi: 3.1.0
paths:
  /audit-log:
    get:
      description: Recent audit-trail events, newest first, each with the actor and, for an impersonated action, the real actor behind it. Read-only; gated by audit:read:admin (admin/owner only, since the audit trail is admin-sensitive).
      operationId: list-audit-log
      parameters:
        - description: Max rows to return, newest first (default 100, capped at 500)
          explode: false
          in: query
          name: limit
          schema:
            description: Max rows to return, newest first (default 100, capped at 500)
            format: int64
            type: integer
        - description: Filter to one resource kind (e.g. auth, principal_grant)
          explode: false
          in: query
          name: resource
          schema:
            description: Filter to one resource kind (e.g. auth, principal_grant)
            type: string
        - description: Filter to one verb (e.g. login, create)
          explode: false
          in: query
          name: verb
          schema:
            description: Filter to one verb (e.g. login, create)
            type: string
        - description: Only events strictly older than this RFC3339 timestamp (paging backward)
          explode: false
          in: query
          name: before
          schema:
            description: Only events strictly older than this RFC3339 timestamp (paging backward)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditListOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List audit-trail events
  /auth/login:
    post:
      description: Verifies a human's password and sets an httpOnly session cookie. Public; a bad credential is a flat 401, and a correct password against a disabled account is a distinct 403 so the screen can explain it.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Log in with a username and password
  /auth/logout:
    post:
      description: Revokes the session token and clears the cookie. Public.
      operationId: logout
      parameters:
        - in: header
          name: Cookie
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log out the current session
  /auth/me:
    get:
      description: Returns the caller's principal, flattened permissions (a UI hint and the fast-reject set), and grants. Requires authentication.
      operationId: get-auth-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: The authenticated principal, its permissions, and grants
    patch:
      description: Updates the caller's own display name (email is administrator-set). Requires authentication; self-scoped (edits only your own principal).
      operationId: update-auth-me
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update your own profile
  /auth/me/avatar:
    get:
      description: Returns the caller's profile picture as a base64-encoded JPEG. Requires authentication; self-scoped. No picture is a 404.
      operationId: get-auth-me-avatar
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get your own profile picture
  /auth/me/sessions:
    get:
      description: Lists the caller's own active bearer credentials (time-bounded web-login sessions and CLI/API tokens) with their non-secret metadata; the current one is flagged. Requires authentication; self-scoped (never another principal's). The token secret is never returned.
      operationId: list-auth-me-sessions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMeSessionsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List your own sessions and tokens
  /auth/me/sessions/{id}:revoke:
    post:
      description: Revokes one of the caller's own sessions or tokens by id (from the session list); revoking the current one signs it out. Requires authentication; self-scoped, so a credential id that is not yours is a 404.
      operationId: revoke-auth-me-session
      parameters:
        - description: The credential id to revoke (from the session list)
          in: path
          name: id
          required: true
          schema:
            description: The credential id to revoke (from the session list)
            type: string
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Revoke one of your own sessions
  /auth/me/sessions:revokeAll:
    post:
      description: Revokes every one of the caller's own web-login sessions, or every one of its CLI/API tokens (chosen by purpose), returning how many were ended. Requires authentication; self-scoped. Always keeps the credential that made this request, so you are never signed out of the one you are on; sessions and tokens never cross.
      operationId: revoke-all-auth-me-sessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAllMeSessionsInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllMeSessionsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke all of your own sessions or tokens
  /auth/me/tokens:
    post:
      description: Mints a CLI/API token for the caller and returns it once (store it now; it cannot be retrieved again). A description is required (what the token is for); an optional ttl_days bounds its lifetime (default 90, maximum 365). Requires authentication; self-scoped (always issued for you). The token is stamped with the device and address that created it.
      operationId: create-auth-me-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeTokenInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMeTokenOutputBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create one of your own API tokens
  /auth/me:changePassword:
    post:
      description: Verifies the current password and sets a new one. Requires authentication; self-scoped.
      operationId: change-auth-me-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Change your own password
  /auth/me:removeAvatar:
    post:
      description: Clears the caller's profile picture. Requires authentication; self-scoped.
      operationId: remove-auth-me-avatar
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Remove your own profile picture
  /auth/me:setAvatar:
    post:
      description: Sets the caller's profile picture (JPEG, PNG, or WebP, base64-encoded), normalized server-side to a 256x256 JPEG. Requires authentication; self-scoped. A bad or oversize image is a 422.
      operationId: set-auth-me-avatar
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAvatarMeInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Set your own profile picture
  /auth/me:stopImpersonation:
    post:
      description: Revokes the impersonation session presented by the request token, ending the view-as / act-as. Requires an impersonation token.
      operationId: stop-impersonation
      responses:
        "204":
          description: No Content
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Stop the current impersonation session
  /auth/status:
    get:
      description: "Public: reports whether any owner has been bootstrapped, so the login screen can hide the bootstrap hint."
      operationId: get-auth-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Whether the system has an owner yet
  /components:
    get:
      description: Lists the components the caller may read, each filtered to its scope subtree. Gated by component:read.
      operationId: list-components
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List components in scope
    post:
      description: Creates a component, optionally under a parent (a root needs an all-scoped grant), bound to a system and a location. Gated by component:create.
      operationId: create-component
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComponentInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a component
  /components/{name}:
    delete:
      description: Deletes a component, refused while it still has child components. Gated by component:delete; read and delete scopes drive the 404 versus 403 split.
      operationId: delete-component
      parameters:
        - description: The component's unique name
          in: path
          name: name
          required: true
          schema:
            description: The component's unique name
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a component
    get:
      description: Fetches a component by name within the caller's read scope. Out of scope is a non-disclosing 404. Gated by component:read.
      operationId: get-component
      parameters:
        - description: The component's unique name
          in: path
          name: name
          required: true
          schema:
            description: The component's unique name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a component
    patch:
      description: Patches a component's display_name or component_type. Gated by component:update; read and update scopes drive the 404 versus 403 split.
      operationId: update-component
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComponentInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a component
  /components/{name}/effective-secrets:
    get:
      description: Resolves the secrets that cascade onto a component (global -> location -> system -> component, most-specific winning), each masked, winner and shadowed candidates. Gated by secret:read; the component must be in the caller's component read scope.
      operationId: effective-secrets
      parameters:
        - description: The component's name
          in: path
          name: name
          required: true
          schema:
            description: The component's name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveSecretsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Effective secrets for a component
  /components/{name}/effective-tags:
    get:
      description: "Resolves the tags that cascade onto a component (global -> location -> system -> component): keys union, values override most-specific-wins, with the winner and shadowed candidates. A non-propagating key resolves only from a binding on the component itself. Gated by component:read; the component must be in the caller's component read scope."
      operationId: effective-tags
      parameters:
        - description: The component's name
          in: path
          name: name
          required: true
          schema:
            description: The component's name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveTagsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Effective tags for a component
  /components/{name}/effective-variables:
    get:
      description: Resolves the variables that cascade onto a component (global -> location -> system -> component, most-specific winning), winner and shadowed candidates. Gated by variable:read; the component must be in the caller's component read scope.
      operationId: effective-variables
      parameters:
        - description: The component's name
          in: path
          name: name
          required: true
          schema:
            description: The component's name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveVariablesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Effective variables for a component
  /components/{name}:listTags:
    get:
      description: Lists the tags bound directly on a component (not the resolved cascade). Gated by component:read.
      operationId: list-component-tags
      parameters:
        - description: The entity's name
          in: path
          name: name
          required: true
          schema:
            description: The entity's name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityTagsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List tags on a component
  /components/{name}:removeTag:
    post:
      description: Removes a key's value from a component. Gated by component:update.
      operationId: remove-component-tag
      parameters:
        - description: The entity's name
          in: path
          name: name
          required: true
          schema:
            description: The entity's name
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityRemoveTagInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Remove a tag value from a component
  /components/{name}:setTag:
    post:
      description: Binds a value for a key on a component. The key must exist and apply to this entity kind. Setting a value is the ordinary entity write, gated by component:update.
      operationId: set-component-tag
      parameters:
        - description: The entity's name
          in: path
          name: name
          required: true
          schema:
            description: The entity's name
