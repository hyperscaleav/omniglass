    LocationBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/LocationBody.json
          format: uri
          readOnly: true
          type: string
        actions:
          description: The scope-aware actions the caller may perform on this row (create a child, update, delete); a UI hint, the server still enforces.
          items:
            type: string
          type:
            - array
            - "null"
        display_name:
          type: string
        id:
          type: string
        location_type:
          type: string
        name:
          type: string
        parent_id:
          type: string
      required:
        - id
        - name
        - location_type
      type: object
    LocationTypeBody:
      additionalProperties: false
      properties:
        display_name:
          type: string
        icon:
          type: string
        id:
          type: string
        official:
          type: boolean
        rank:
          format: int64
          type: integer
      required:
        - id
        - display_name
        - rank
        - icon
        - official
      type: object
    LoginInputBody:
      additionalProperties: false
