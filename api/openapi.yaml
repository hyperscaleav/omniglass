        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/PrincipalBody.json
          format: uri
          readOnly: true
          type: string
        active:
          type: boolean
        archived_at:
          description: Set when the principal is archived (soft-deleted); absent means live
          format: date-time
          type: string
        grants:
          items:
            $ref: "#/components/schemas/GrantBody"
          type:
            - array
            - "null"
        groups:
          items:
            $ref: "#/components/schemas/PrincipalGroupRef"
          type:
            - array
            - "null"
        human:
          $ref: "#/components/schemas/HumanBody"
        id:
          type: string
        kind:
          type: string
        service:
          $ref: "#/components/schemas/SvcBody"
      required:
        - id
        - kind
        - active
        - grants
        - groups
      type: object
    PrincipalGroupRef:
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
      type: object
    PrincipalStruct:
      additionalProperties: false
      properties:
        id:
          type: string
        kind:
          type: string
      required:
        - id
        - kind
      type: object
    ResetPasswordInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/ResetPasswordInputBody.json
          format: uri
          readOnly: true
          type: string
        password:
          description: The new password (at least 12 characters, not a common password, not containing the username)
          maxLength: 256
          minLength: 12
          type: string
      required:
        - password
      type: object
    ResolvedSecretBody:
      additionalProperties: false
      properties:
        band:
          description: "Cascade tier: 0 global, 1 location, 2 system, 3 component"
          format: int64
          type: integer
        depth:
          description: Distance up the tier's tree from the component (0 nearest)
          format: int64
          type: integer
        fields:
          items:
            $ref: "#/components/schemas/SecretFieldBody"
          type:
            - array
            - "null"
        id:
          type: string
        name:
          type: string
        owner_id:
          type: string
        owner_kind:
          type: string
        owner_name:
          type: string
        secret_type:
          type: string
        winner:
          description: True for the resolved value; false for a shadowed candidate
          type: boolean
      required:
        - id
        - name
        - secret_type
        - owner_kind
        - band
        - depth
        - winner
        - fields
      type: object
    RevealSecretOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/RevealSecretOutputBody.json
          format: uri
          readOnly: true
          type: string
        fields:
          additionalProperties:
            type: string
          description: The decrypted field values, keyed by field name
          type: object
      required:
        - fields
      type: object
    RoleBody:
      additionalProperties: false
      properties:
        description:
          type: string
        display_name:
          type: string
        effective_permissions:
          items:
            type: string
          type:
            - array
            - "null"
        id:
          type: string
        inherits:
          items:
            type: string
          type:
            - array
            - "null"
        official:
          type: boolean
        permissions:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - id
        - official
        - permissions
        - inherits
        - effective_permissions
      type: object
    RolesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/RolesOutputBody.json
          format: uri
          readOnly: true
          type: string
        roles:
          items:
            $ref: "#/components/schemas/RoleBody"
          type:
            - array
            - "null"
      required:
        - roles
      type: object
    SecretBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/SecretBody.json
          format: uri
          readOnly: true
          type: string
        fields:
          items:
            $ref: "#/components/schemas/SecretFieldBody"
          type:
            - array
            - "null"
        id:
          type: string
        name:
          type: string
        owner_id:
          type: string
        owner_kind:
          type: string
        owner_name:
          type: string
        secret_type:
          type: string
      required:
        - id
        - name
        - secret_type
        - owner_kind
        - fields
      type: object
    SecretFieldBody:
      additionalProperties: false
      properties:
        name:
          type: string
        secret:
          description: Whether the field is encrypted at rest and masked here
          type: boolean
        value:
          type: string
      required:
        - name
        - value
        - secret
      type: object
    SecretTypeBody:
      additionalProperties: false
      properties:
        display_name:
          type: string
        fields:
          items:
            $ref: "#/components/schemas/SecretTypeFieldBody"
          type:
            - array
            - "null"
        id:
          type: string
        official:
          type: boolean
      required:
        - id
        - display_name
        - official
        - fields
      type: object
    SecretTypeFieldBody:
      additionalProperties: false
      properties:
        name:
          type: string
        origin:
          description: operator (set at creation) or lifecycle (filled by the secret's own machinery)
          type: string
        secret:
          type: boolean
        type:
          type: string
      required:
        - name
        - type
        - secret
        - origin
      type: object
    SvcBody:
      additionalProperties: false
      properties:
        label:
          type: string
      required:
        - label
      type: object
    SystemBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/SystemBody.json
          format: uri
          readOnly: true
          type: string
        actions:
          description: The scope-aware actions the caller may perform on this row (create a child, update, delete); a UI hint, the server still enforces.
          items:
            type: string
          type:
            - array
            - "null"
        display_name:
          type: string
        id:
          type: string
        location_id:
          type: string
        name:
          type: string
        parent_id:
          type: string
        system_type:
          type: string
      required:
        - id
        - name
        - system_type
      type: object
    UpdateComponentInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateComponentInputBody.json
          format: uri
          readOnly: true
          type: string
        component_type:
          type: string
        display_name:
          type: string
      type: object
    UpdateGroupInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateGroupInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          description: Description; empty clears it
          maxLength: 1000
          type: string
        display_name:
          description: Display name; empty clears it
          maxLength: 200
          type: string
        name:
          description: Group name (lowercase letters, digits, and . _ -); renaming is safe
          maxLength: 200
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9._-]*$
          type: string
      type: object
    UpdateLocationInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateLocationInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        location_type:
          type: string
      type: object
    UpdateMeInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateMeInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          description: Your display name; empty clears it
          maxLength: 200
          type: string
      type: object
    UpdatePrincipalInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdatePrincipalInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          description: Display name; empty clears it
          maxLength: 200
          type: string
        email:
          description: Email; empty clears it
          maxLength: 320
          type: string
        username:
          description: Sign-in name (lowercase letters, digits, and . _ -); renaming is safe
          maxLength: 200
          minLength: 1
          pattern: ^[a-z0-9][a-z0-9._-]*$
          type: string
      type: object
    UpdateSecretInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateSecretInputBody.json
          format: uri
          readOnly: true
          type: string
        fields:
          additionalProperties:
            type: string
          description: The field values to replace; an omitted field keeps its value
          type: object
      required:
        - fields
      type: object
    UpdateSystemInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - /api/v1/schemas/UpdateSystemInputBody.json
          format: uri
          readOnly: true
          type: string
        display_name:
          type: string
        system_type:
          type: string
      type: object
info:
  title: Omniglass
  version: 0.0.1-skeleton
openapi: 3.1.0
paths:
  /audit-log:
    get:
      description: Recent audit-trail events, newest first, each with the actor and, for an impersonated action, the real actor behind it. Read-only; gated by audit:read:admin (admin/owner only, since the audit trail is admin-sensitive).
      operationId: list-audit-log
      parameters:
        - description: Max rows to return, newest first (default 100, capped at 500)
          explode: false
          in: query
          name: limit
          schema:
            description: Max rows to return, newest first (default 100, capped at 500)
            format: int64
            type: integer
        - description: Filter to one resource kind (e.g. auth, principal_grant)
          explode: false
          in: query
          name: resource
          schema:
            description: Filter to one resource kind (e.g. auth, principal_grant)
            type: string
        - description: Filter to one verb (e.g. login, create)
          explode: false
          in: query
          name: verb
          schema:
            description: Filter to one verb (e.g. login, create)
            type: string
        - description: Only events strictly older than this RFC3339 timestamp (paging backward)
          explode: false
          in: query
          name: before
          schema:
            description: Only events strictly older than this RFC3339 timestamp (paging backward)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditListOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List audit-trail events
  /auth/login:
    post:
      description: Verifies a human's password and sets an httpOnly session cookie. Public; a bad credential is a flat 401, and a correct password against a disabled account is a distinct 403 so the screen can explain it.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInputBody"
        required: true
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Log in with a username and password
  /auth/logout:
    post:
      description: Revokes the session token and clears the cookie. Public.
      operationId: logout
      parameters:
        - in: header
          name: Cookie
          schema:
            type: string
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log out the current session
  /auth/me:
    get:
      description: Returns the caller's principal, flattened permissions (a UI hint and the fast-reject set), and grants. Requires authentication.
      operationId: get-auth-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: The authenticated principal, its permissions, and grants
    patch:
      description: Updates the caller's own display name (email is administrator-set). Requires authentication; self-scoped (edits only your own principal).
      operationId: update-auth-me
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update your own profile
  /auth/me:changePassword:
    post:
      description: Verifies the current password and sets a new one. Requires authentication; self-scoped.
      operationId: change-auth-me-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Change your own password
  /auth/me:stopImpersonation:
    post:
      description: Revokes the impersonation session presented by the request token, ending the view-as / act-as. Requires an impersonation token.
      operationId: stop-impersonation
      responses:
        "204":
          description: No Content
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Stop the current impersonation session
  /auth/status:
    get:
      description: "Public: reports whether any owner has been bootstrapped, so the login screen can hide the bootstrap hint."
      operationId: get-auth-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Whether the system has an owner yet
  /components:
    get:
      description: Lists the components the caller may read, each filtered to its scope subtree. Gated by component:read.
      operationId: list-components
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComponentsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List components in scope
    post:
      description: Creates a component, optionally under a parent (a root needs an all-scoped grant), bound to a system and a location. Gated by component:create.
      operationId: create-component
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComponentInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a component
  /components/{name}:
    delete:
      description: Deletes a component, refused while it still has child components. Gated by component:delete; read and delete scopes drive the 404 versus 403 split.
      operationId: delete-component
      parameters:
        - description: The component's unique name
          in: path
          name: name
          required: true
          schema:
            description: The component's unique name
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a component
    get:
      description: Fetches a component by name within the caller's read scope. Out of scope is a non-disclosing 404. Gated by component:read.
      operationId: get-component
      parameters:
        - description: The component's unique name
          in: path
          name: name
          required: true
          schema:
            description: The component's unique name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a component
    patch:
      description: Patches a component's display_name or component_type. Gated by component:update; read and update scopes drive the 404 versus 403 split.
      operationId: update-component
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComponentInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a component
  /components/{name}/effective-secrets:
    get:
      description: Resolves the secrets that cascade onto a component (global -> location -> system -> component, most-specific winning), each masked, winner and shadowed candidates. Gated by secret:read; the component must be in the caller's component read scope.
      operationId: effective-secrets
      parameters:
        - description: The component's name
          in: path
          name: name
          required: true
          schema:
            description: The component's name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectiveSecretsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Effective secrets for a component
  /healthz:
    get:
      description: Reports process health and the database leg, pinged through the Storage Gateway.
      operationId: get-healthz
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Liveness and database-reachability probe
  /location-types:
    get:
      description: Lists the location_type registry (the shape-definers a location is classified by), ordered by rank. Populates the type picker on the location form. Gated by location:read.
      operationId: list-location-types
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLocationTypesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List location types
  /locations:
    get:
      description: Lists the locations the caller may read, each filtered to its scope subtree. Gated by location:read.
      operationId: list-locations
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLocationsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List locations in scope
    post:
      description: Creates a location, optionally under a parent (a root needs an all-scoped grant). Gated by location:create.
      operationId: create-location
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a location
  /locations/{name}:
    delete:
      description: Deletes a location, refused while it still has child locations. Gated by location:delete; read and delete scopes drive the 404 versus 403 split.
      operationId: delete-location
      parameters:
        - description: The location's unique name
          in: path
          name: name
          required: true
          schema:
            description: The location's unique name
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a location
    get:
      description: Fetches a location by name within the caller's read scope. Out of scope is a non-disclosing 404. Gated by location:read.
      operationId: get-location
      parameters:
        - description: The location's unique name
          in: path
          name: name
          required: true
          schema:
            description: The location's unique name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a location
    patch:
      description: Patches a location's display_name or location_type. Gated by location:update; the read and update scopes drive the 404 versus 403 split.
      operationId: update-location
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a location
  /principal-groups:
    get:
      description: Every principal group. Gated by principal_group:read (all-scope).
      operationId: list-groups
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List principal groups
    post:
      description: Creates a principal group. Gated by principal_group:create (all-scope). A duplicate name is 409.
      operationId: create-group
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a principal group
  /principal-groups/{id}:
    delete:
      description: Removes a group and, by cascade, its memberships and grants. Gated by principal_group:delete (all-scope).
      operationId: delete-group
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a principal group
    get:
      description: One principal group by id. Gated by principal_group:read (all-scope).
      operationId: get-group
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a principal group
    patch:
      description: Updates a group's name and presentational fields. Gated by principal_group:update (all-scope). A duplicate name is 409.
      operationId: update-group
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a principal group
  /principal-groups/{id}/grants:
    get:
      description: The role x scope grants a group confers on its members. Gated by principal_group:read (all-scope).
      operationId: list-group-grants
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupGrantsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List a group's grants
    post:
      description: Assigns a role at a scope to a group; its members inherit it. Gated by principal_grant:create (all-scope). Refused (403) when the granted role's capabilities exceed the granter's own, exactly as for a direct grant. A duplicate is 409.
      operationId: create-group-grant
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupGrantInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Grant a role to a group
  /principal-groups/{id}/grants/{grantId}:
    delete:
      description: Removes one grant from a group. Gated by principal_grant:delete (all-scope).
      operationId: revoke-group-grant
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
        - description: The grant's id (uuid)
          in: path
          name: grantId
          required: true
          schema:
            description: The grant's id (uuid)
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke a group grant
  /principal-groups/{id}/members:
    get:
      description: The principals in a group. Gated by principal_group:read (all-scope).
      operationId: list-group-members
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembersOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List a group's members
    post:
      description: Adds a principal to a group; its members inherit the group's grants. Gated by principal_group:update (all-scope). Idempotent.
      operationId: add-group-member
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Add a member to a group
  /principal-groups/{id}/members/{principalId}:
    delete:
      description: Removes a principal from a group; it stops inheriting the group's grants. Gated by principal_group:update (all-scope).
      operationId: remove-group-member
      parameters:
        - description: The group's id (uuid)
          in: path
          name: id
          required: true
          schema:
            description: The group's id (uuid)
            type: string
        - description: The member principal's id (uuid)
          in: path
          name: principalId
          required: true
          schema:
            description: The member principal's id (uuid)
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Remove a member from a group
  /principals:
    get:
      description: Lists all principals (humans and service accounts) with their grants. Gated by principal:read, which confers access only at all-scope.
      operationId: list-principals
      parameters:
        - description: Optionally filter by principal kind
          explode: false
          in: query
          name: kind
          schema:
            description: Optionally filter by principal kind
            enum:
              - human
              - service
            type: string
        - description: Include archived (soft-deleted) principals, hidden by default
          explode: false
          in: query
          name: include_archived
          schema:
            description: Include archived (soft-deleted) principals, hidden by default
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrincipalsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List principals
    post:
      description: Creates a human principal with an optional initial password. Gated by principal:create (all-scope). The new principal holds no grants; assign roles separately.
      operationId: create-principal
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrincipalInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrincipalBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a human principal
  /principals/{id}:
    get:
      description: Fetches one principal by id with its profile and grants. Gated by principal:read (all-scope).
      operationId: get-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrincipalBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a principal
    patch:
      description: "Updates a human principal's display name, email, and username. Gated by principal:update (all-scope). Renaming is safe: nothing keys on the username."
      operationId: update-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrincipalInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrincipalBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a principal
  /principals/{id}/grants:
    post:
      description: Assigns a role at a scope to a principal. Gated by principal_grant:create (all-scope). Refused (403) when the granted role's capabilities exceed the granter's own (no promoting anyone, including yourself, to a higher tier such as owner). A duplicate is 409, an unknown role or bad scope 422.
      operationId: create-grant
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrantInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Grant a role to a principal
  /principals/{id}/grants/{grantId}:
    delete:
      description: Removes one grant from a principal. Gated by principal_grant:delete (all-scope). The last owner grant cannot be revoked.
      operationId: revoke-grant
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
        - description: The grant's id (uuid)
          in: path
          name: grantId
          required: true
          schema:
            description: The grant's id (uuid)
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke a grant
  /principals/{id}:archive:
    post:
      description: "Soft-deletes a principal: it is hidden from the directory, can no longer authenticate, and its rows stay intact, reversibly (restore) until purged. Gated by principal:archive (all-scope). The last active owner cannot be archived."
      operationId: archive-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Archive a principal
  /principals/{id}:disable:
    post:
      description: Soft-disables a principal so it can no longer authenticate; its audit trail is kept. Gated by principal:update (all-scope). The last active owner cannot be disabled.
      operationId: disable-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Disable a principal
  /principals/{id}:enable:
    post:
      description: Re-enables a disabled principal, restoring its ability to authenticate. Gated by principal:update (all-scope).
      operationId: enable-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Enable a principal
  /principals/{id}:impersonate:
    post:
      description: Mints a bounded, revocable token to view as (read-only) or act as (full) the target. Gated by principal:impersonate (all-scope). Refused on self, on an owner target (owners are un-impersonatable by anyone), when it would grant a capability the caller lacks (the escalation guard), or from within an existing impersonation.
      operationId: impersonate-principal
      parameters:
        - description: The principal to impersonate, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal to impersonate, addressed by its uuid or a human username
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpersonateInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpersonateOutputBody"
          description: Created
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Impersonate a principal (view-as or act-as)
  /principals/{id}:purge:
    post:
      description: Hard-deletes an archived principal and its owned rows (profile, credentials, grants, memberships); the audit trail is preserved. Irreversible. Gated by principal:purge (admin-sensitive, all-scope), and the principal must be archived first.
      operationId: purge-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Purge a principal
  /principals/{id}:resetPassword:
    post:
      description: Sets a new password for another human principal (an administrator action; the target's current password is not required). Gated by principal:reset-password (all-scope). The new password must meet the password policy; a violation is a 422. Refused on yourself (change your own password from your profile, which verifies your current one), on an owner (owners cannot be reset by anyone), or when it would exceed the caller's own capabilities (the takeover guard, shared with impersonation). The action is audited with the administrator as the actor.
      operationId: reset-principal-password
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reset a principal's password
  /principals/{id}:restore:
    post:
      description: "Reverses an archive: the account is restored to active and can authenticate again. Gated by principal:archive (all-scope)."
      operationId: restore-principal
      parameters:
        - description: The principal, addressed by its uuid or a human username
          in: path
          name: id
          required: true
          schema:
            description: The principal, addressed by its uuid or a human username
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Restore a principal
  /roles:
    get:
      description: Lists the roles with their metadata and effective (flattened) permissions. Gated by the role:read capability.
      operationId: list-roles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List roles
  /secret-types:
    get:
      description: Lists the secret_type shapes a secret can take, for the create form. Gated by secret:read.
      operationId: list-secret-types
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSecretTypesOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List secret types
  /secrets:
    get:
      description: Lists every secret with masked fields. Requires an all-scope read; the scoped, per-component view is the effective-secrets route. Gated by secret:read.
      operationId: list-secrets
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSecretsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List secrets (admin directory)
    post:
      description: Seals a secret at an owner scope (a global secret needs an all-scoped grant). Fields are validated and encrypted against the type shape. Gated by secret:create.
      operationId: create-secret
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSecretInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a secret
  /secrets/{id}:
    delete:
      description: Removes a secret by id. Gated by secret:delete; read and delete scopes on the owner drive the 404 versus 403 split.
      operationId: delete-secret
      parameters:
        - description: The secret's id
          in: path
          name: id
          required: true
          schema:
            description: The secret's id
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a secret
    patch:
      description: Replaces the given field values on a secret, re-sealing secret fields. Only values change; name, type, and owner are fixed at creation. An omitted field keeps its value. Gated by secret:update.
      operationId: update-secret
      parameters:
        - description: The secret's id
          in: path
          name: id
          required: true
          schema:
            description: The secret's id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSecretInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a secret's field values
  /secrets/{id}:reveal:
    post:
      description: "Decrypts and returns a secret's field values, auditing the decrypt. Sensitive: gated by secret:reveal, which the viewer read floor does not carry, so only admin (secret:*) and owner may reveal."
      operationId: reveal-secret
      parameters:
        - description: The secret's id
          in: path
          name: id
          required: true
          schema:
            description: The secret's id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevealSecretOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reveal a secret's plaintext
  /systems:
    get:
      description: Lists the systems the caller may read, each filtered to its scope subtree. Gated by system:read.
      operationId: list-systems
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSystemsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List systems in scope
    post:
      description: Creates a system, optionally under a parent (a root needs an all-scoped grant) and at a location. Gated by system:create.
      operationId: create-system
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSystemInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a system
  /systems/{name}:
    delete:
      description: Deletes a system, refused while it still has child systems. Gated by system:delete; read and delete scopes drive the 404 versus 403 split.
      operationId: delete-system
      parameters:
        - description: The system's unique name
          in: path
          name: name
          required: true
          schema:
            description: The system's unique name
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a system
    get:
      description: Fetches a system by name within the caller's read scope. Out of scope is a non-disclosing 404. Gated by system:read.
      operationId: get-system
      parameters:
        - description: The system's unique name
          in: path
          name: name
          required: true
          schema:
            description: The system's unique name
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a system
    patch:
      description: Patches a system's display_name or system_type. Gated by system:update; read and update scopes drive the 404 versus 403 split.
      operationId: update-system
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSystemInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a system
servers:
  - url: /api/v1

