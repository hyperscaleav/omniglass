          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a secret
  /secrets/{id}:
    delete:
      description: Removes a secret by id. Gated by secret:delete; read and delete scopes on the owner drive the 404 versus 403 split.
      operationId: delete-secret
      parameters:
        - description: The secret's id
          in: path
          name: id
          required: true
          schema:
            description: The secret's id
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a secret
    patch:
      description: Replaces the given field values on a secret, re-sealing secret fields. Only values change; name, type, and owner are fixed at creation. An omitted field keeps its value. Gated by secret:update.
      operationId: update-secret
      parameters:
        - description: The secret's id
          in: path
          name: id
          required: true
          schema:
            description: The secret's id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSecretInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
