name: release

# Manual release. Releases are NOT cut on merge to main (deliberately, for now):
# this runs only when dispatched by hand, and the primary path is the local
# `make release-plan` / `make release-apply` targets. It reads the conventional-
# commit subjects since the last tag (each is a squash-merged PR title, linted by
# pr-title.yml), computes the next version, pushes a git tag, and creates a
# GitHub Release with generated notes. No changelog is committed back to main;
# the tag is the artifact, and the binary release pipeline (#55) builds off it.
# To switch to release-on-merge later, change the trigger to `push: branches:
# [main]`.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only (compute version + notes, publish nothing)"
        type: boolean
        default: false

permissions:
  contents: write       # push the tag, create the GitHub Release
  issues: write         # comment on released issues
  pull-requests: write  # comment on released PRs

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags for version analysis
          persist-credentials: false

      - uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        id: semantic
        with:
          dry_run: ${{ inputs.dry_run }}
          # Plugins are pinned in .releaserc.json (the npm publish plugin is
          # deliberately excluded: this is a Go repo, nothing publishes to npm).
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attach the cross-platform binaries to the Release semantic-release just
      # cut. This path pushed its tag with GITHUB_TOKEN, which by design does
      # not cascade to the tag-triggered goreleaser workflow, so the binaries
      # are built inline here. Gated on an actual new release (dry-runs skip
      # it). Shares .goreleaser.yaml with goreleaser.yml.
      - uses: actions/setup-go@v5
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node (for the embedded console build)
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install syft (SBOM generator)
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.semantic.outputs.new_release_git_tag }}
