name: goreleaser

# Build the cross-platform release binaries and attach them to the GitHub
# Release for a `v*` tag. semantic-release cuts the tag + Release (with notes);
# this fills that Release with the binary archives, checksums, and SBOMs.
#
# It fires on a pushed `v*` tag, which is what `make release-apply` produces
# locally (a tag pushed with a user/PAT token cascades to workflows). The
# CI-dispatch release path pushes its tag with GITHUB_TOKEN, which by design
# does NOT cascade, so that path builds the binaries inline in release.yml
# instead. Either way the binaries are built here in CI, never on a laptop.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # upload the archives + checksums to the Release

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for GoReleaser

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node (for the embedded console build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit tag so GoReleaser targets the pushed tag (and its Release)
          # unambiguously, rather than inferring from git state.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
