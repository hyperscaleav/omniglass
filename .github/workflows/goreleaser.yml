name: goreleaser

# Build the cross-platform release binaries. Two triggers, two jobs:
#
# - on a pushed `v*` tag (the `make release-apply` path, whose token cascades):
#   build the matrix and attach the archives to the GitHub Release that
#   semantic-release already cut. The CI-dispatch release path builds inline in
#   release.yml instead, because its GITHUB_TOKEN tag push does not cascade here.
#
# - on a pull request that touches the release config: build the whole matrix as
#   a snapshot (no tag, no publish) and upload the archives as workflow
#   artifacts, so the release build is validated and downloadable before merge.
#
# Both jobs drive the same .goreleaser.yaml, so a green PR snapshot is real
# evidence the tagged release will build.

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - .goreleaser.yaml
      - .github/workflows/goreleaser.yml
      - go.mod
      - go.sum
      - cmd/omniglass/**

# Least privilege by default; only the publishing job asks for write.
permissions:
  contents: read

jobs:
  # Real release: build + attach binaries to the Release for the pushed tag.
  binaries:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # upload the archives + checksums to the Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for GoReleaser

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node (for the embedded console build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit tag so GoReleaser targets the pushed tag (and its Release)
          # unambiguously, rather than inferring from git state.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  # PR validation: build the whole matrix as a snapshot (no tag, no publish) and
  # upload the archives so they can be downloaded and smoke-tested.
  snapshot:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node (for the embedded console build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload snapshot binaries
        uses: actions/upload-artifact@v4
        with:
          name: omniglass-binaries-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error
