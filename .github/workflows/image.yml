name: image

# Build the single container image (console embedded) and publish it to GHCR.
# On main it tags `latest` + the commit sha; on a PR it tags `pr-<n>` + the
# commit sha so the preview pipeline can pin a deploy to an exact build.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read the repo, write packages (GHCR). Fork PRs get a
# read-only token, so the login and push steps are skipped for them.
permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # No arm64 CI hardware: cross-compile the arm64 image, load it, and boot the
  # binary under QEMU. This is the only arm64 validation, and it gates the
  # publish below so a broken arm64 build never reaches the GHCR manifest.
  smoke-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Register QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Build the arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: omniglass:arm64-smoke
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot the arm64 binary under emulation
        # `--help` is handled by cobra before any run mode, so it needs no DB
        # and exits 0 only if the cross-compiled arm64 binary actually runs.
        run: docker run --rm --platform linux/arm64 omniglass:arm64-smoke --help

  # End-to-end boot smoke: build the native amd64 image, run it in `server` mode
  # against a real Postgres, and prove the deploy unit actually comes up: the
  # migrations apply, the boot seed runs, the health endpoint is green, and the
  # operator console (the login page) is served. `--help` alone (above) proves the
  # binary runs, not that a fresh instance boots and serves; this closes that gap.
  smoke-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build the amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: omniglass:boot-smoke
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot a fresh instance and probe the login page
        run: |
          set -euo pipefail
          docker network create og-smoke
          docker run -d --name pg --network og-smoke \
            -e POSTGRES_USER=omniglass -e POSTGRES_PASSWORD=omniglass -e POSTGRES_DB=omniglass \
            postgres:18
          echo "waiting for postgres..."
          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U omniglass -d omniglass >/dev/null 2>&1; then break; fi
            sleep 2
          done
          docker exec pg pg_isready -U omniglass -d omniglass

          # The container in `server` mode auto-migrates, runs the boot seed, and serves.
          docker run -d --name app --network og-smoke \
            -e OMNIGLASS_DSN="postgres://omniglass:omniglass@pg:5432/omniglass?sslmode=disable" \
            -e OMNIGLASS_ADDR=":8080" \
            -p 127.0.0.1:8080:8080 \
            omniglass:boot-smoke

          echo "waiting for the health endpoint..."
          ok=""
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/healthz || true)
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 2
          done
          if [ -z "$ok" ]; then echo "healthz never returned 200"; exit 1; fi

          # The operator console (login page) must be served, following the trailing
          # slash redirect. A fresh instance not serving /web is a broken deploy.
          web=$(curl -sL -o /dev/null -w '%{http_code}' http://localhost:8080/web)
          echo "healthz=200 web=$web"
          if [ "$web" != "200" ]; then echo "login page did not come up (/web=$web)"; exit 1; fi

          # The public bootstrap-status endpoint the login screen reads must answer.
          curl -sf http://localhost:8080/api/v1/auth/status >/dev/null

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== app ==="; docker logs app 2>&1 | tail -50 || true
          echo "=== pg ===";  docker logs pg  2>&1 | tail -30 || true

  build-push:
    # Only publish the multi-arch manifest once arm64 cross-build boots and a
    # fresh amd64 instance actually comes up end to end.
    needs: [smoke-arm64, smoke-boot]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        # On a pull_request, GITHUB_SHA is the merge commit, so type=sha would
        # tag sha-<merge>. The preview ApplicationSet pins image.tag to the PR
        # head_sha, so tag by the head sha instead, or the two never match and
        # the preview ImagePullBackOffs.
        env:
          DOCKER_METADATA_PR_HEAD_SHA: "true"
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
