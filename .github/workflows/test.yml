name: test

# The CI test gate. `make test` is the local gate (validate-locally doctrine);
# this is the backstop on every PR and on main. The integration and e2e tiers
# use testcontainers-go, which needs a Docker daemon; ubuntu-latest ships one.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Track the toolchain pinned in go.mod so CI never drifts from local.
          go-version-file: go.mod
          cache: true

      # No -tags web: the build-tag-with-fallback embed (internal/webui) serves
      # a placeholder without a real dist/, so the gate needs no SPA build.
      - name: Build
        run: go build ./...

      # The collection tier's icmp probe opens an unprivileged SOCK_DGRAM ICMP
      # socket, which its real-capability test exercises. Runners disallow that by
      # default (net.ipv4.ping_group_range excludes the runner gid), so widen the
      # range to let the gate actually run on CI rather than skip it.
      - name: Allow unprivileged ICMP (for the icmp capability gate)
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Test
        run: go test ./...
