name: Bug
description: Something behaves incorrectly.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What should happen, and what happens instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, config, or a failing command. A bug fix starts with a failing regression test.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: false
