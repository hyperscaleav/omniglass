name: Feature / slice
description: A single vertical slice of behavior.
title: "feat: "
labels: ["feature"]
body:
  - type: input
    id: epic
    attributes:
      label: Parent epic
      description: The epic this belongs to (e.g. #12).
    validations:
      required: false
  - type: textarea
    id: behavior
    attributes:
      label: Behavior
      description: What the feature does and how it is observed (an assertion, not a vibe).
    validations:
      required: true
  - type: textarea
    id: surfaces
    attributes:
      label: Surfaces (API / CLI / UI)
      description: >-
        Every entry point this slice touches. The API route(s); the generated CLI command(s);
        the UI view (live where the entity exists, an honest stub where its backend does not yet).
    validations:
      required: true
  - type: textarea
    id: test
    attributes:
      label: How it will be tested
      description: The failing test that will prove it. Tier(s)? unit / integration / e2e.
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Docs / learning page
      description: The docs that ship with it. Is there an interactive learning surface?
    validations:
      required: false
  - type: textarea
    id: thin_cut
    attributes:
      label: Thin cut
      description: The deliberate simplifications this slice makes (the smallest honest increment).
    validations:
      required: false
  - type: textarea
    id: deferred
    attributes:
      label: Deferred
      description: Work moved to later slices, each its own follow-up issue (link them).
    validations:
      required: false
  - type: input
    id: authz
    attributes:
      label: Permission and scope touched
      description: The "<resource>:<action>" permission checked and the ABAC scope injected, if any.
    validations:
      required: false
