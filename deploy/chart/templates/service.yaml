apiVersion: v1
kind: Service
metadata:
  name: {{ include "omniglass.fullname" . }}
  labels:
    {{- include "omniglass.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  selector:
    {{- include "omniglass.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
