# Dev-only example estate, applied by `make dev` (via `omniglass seed-dev`) so a
# fresh dev environment comes up populated instead of empty: a few campuses (a
# multi-site estate), a few users, and their grants. Idempotent: re-running leaves
# anything that already exists untouched.
#
# This is NOT the boot seed (internal/seed, ship-with reference data that runs on
# every server start in every environment) and it must NEVER run in production:
# these are operator rows. It references reference data (location types, roles) by
# id, so the boot seed must run first.
locations:
  # Headquarters: the deepest site (campus -> building -> floor -> rooms).
  - name: hq
    display_name: Headquarters
    type: campus
  - name: hq-west
    display_name: West Building
    type: building
    parent: hq
  - name: hq-west-2
    display_name: Level 2
    type: floor
    parent: hq-west
  - name: hq-west-2-boardroom
    display_name: Boardroom
    type: room
    parent: hq-west-2
  - name: hq-west-2-huddle
    display_name: Huddle Room
    type: room
    parent: hq-west-2

  # East Campus: a second site.
  - name: east
    display_name: East Campus
    type: campus
  - name: east-hall
    display_name: Innovation Hall
    type: building
    parent: east
  - name: east-hall-1
    display_name: Level 1
    type: floor
    parent: east-hall
  - name: east-hall-1-auditorium
    display_name: Auditorium
    type: room
    parent: east-hall-1
  - name: east-hall-1-lab
    display_name: Media Lab
    type: room
    parent: east-hall-1

  # Airport Office: a small third site (campus -> building -> room).
  - name: airport
    display_name: Airport Office
    type: campus
  - name: airport-annex
    display_name: Annex
    type: building
    parent: airport
  - name: airport-annex-briefing
    display_name: Briefing Room
    type: room
    parent: airport-annex

users:
  # Username convention: a user limited to a region carries that region in its name
  # (viewer-hq, tech-east); an estate-wide user carries none (operator). No `-dev`
  # suffix, since this fixture only ever seeds a dev environment. All share the
  # password `dev`.

  # A broad operator, all-scoped across every site: no region, since the grant is
  # estate-wide. The everyday driver for demos.
  - username: operator
    password: dev
    display_name: Operator
    grants:
      - role: operator
        scope_kind: all
  # A read-only viewer confined to the Headquarters campus.
  - username: viewer-hq
    password: dev
    display_name: HQ Viewer
    grants:
      - role: viewer
        scope_kind: location
        scope_ref: hq
        scope_op: subtree
  # A field tech scoped to the East campus, who builds out rooms under it but cannot
  # touch the campus root itself (exercises subtree_excl_root, on a different site than
  # the viewer, so the seed shows per-site scoping).
  - username: tech-east
    password: dev
    display_name: East Field Tech
    grants:
      - role: deploy
        scope_kind: location
        scope_ref: east
        scope_op: subtree_excl_root

# Global example variables (macros), so the Variables directory comes up
# populated. Scoped variables are added once the dev estate seeds systems and
# components; these globals need no owner.
variables:
  - name: poll_interval
    value_type: int
    value: 60
  - name: base_url
    value_type: string
    value: https://api.hyperscaleav.com
  - name: tls_verify
    value_type: bool
    value: true
  - name: retry_policy
    value_type: json
    value:
      retries: 3
      backoff: 1s

# Tags: a governed key vocabulary plus a couple of example bindings, so the Tags
# directory and the effective-tags cascade come up populated. `environment` is
# universal with a tenant-wide default; `category` is narrowed to components;
# `asset_id` is non-propagating (a flat per-entity label). The scoped binding
# overrides the global default for the west building's subtree, so a component
# under it teaches the override.
tags:
  - name: environment
    global_value: prod
  - name: category
    applies_to: [component]
  - name: asset_id
    propagates: false
tag_bindings:
  - key: environment
    location: hq-west
    value: staging

# Files: a few example handles over the content-addressed blob store, so the
# Files directory comes up populated with both ordinary (shared) files and a
# sensitive one (admin-tier only). Bytes ride inline here; the server hashes and
# deduplicates them on create.
files:
  - name: boardroom-recovery-runbook.md
    content_type: text/markdown
    content: |
      # Boardroom Recovery
      1. Power-cycle the codec
      2. Verify SIP registration
      3. Check the DSP presets
  - name: dsp-preset-export.json
    content_type: application/json
    content: '{"preset":"conference","gain":-6,"aec":true}'
  - name: codec-firmware-2.1.4.txt
    content_type: text/plain
    content: "placeholder firmware notes for the Cisco codec, release 2.1.4"
  - name: integrator-quote-confidential.txt
    content_type: text/plain
    content: "CONFIDENTIAL competitive bid, integrator A"
    sensitive: true

# Field definitions: a couple of typed fields declared on the `display`
# component_type, so the field primitive comes up with a schema to teach.
# `diagonal_inches` carries a default (55); `asset_tag` and `location_note` have none,
# so the effective-values panel shows a default-vs-plain contrast. Flat and
# unscoped, like the type registries (no owner, no ABAC scope).
field_definitions:
  - component_type: display
    name: asset_tag
    display_name: Asset tag
    data_type: string
  - component_type: display
    name: diagonal_inches
    display_name: Diagonal inches
    data_type: int
    default: 55
  - component_type: display
    name: location_note
    display_name: Location note
    data_type: string

# Components: one example device placed in the estate, so the Components directory
# comes up populated. The Lobby Display sits in the Boardroom under the west
# building, whose subtree also carries the environment=staging tag override, so a
# single component teaches both the field cascade and the tag cascade.
components:
  - name: lobby-display
    display_name: Lobby Display
    component_type: display
    location: hq-west-2-boardroom

# Field values: an override the Lobby Display sets for `diagonal_inches` (65 over
# the definition's default of 55), so the effective-values panel teaches
# direct-vs-inherited; `asset_tag` and `location_note` stay unset to show the
# other side of that contrast.
field_values:
  - component: lobby-display
    field: diagonal_inches
    value: 65
