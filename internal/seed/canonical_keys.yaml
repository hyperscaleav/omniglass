# The official canonical-key canon, seeded idempotently at boot. A key is a typed,
# owner-agnostic name (snake_case, dot-hierarchied) that a datapoint observes and a
# field declares. Observed keys carry a kind (metric/state/log) and unit; declared
# attribute keys carry neither. validation is a JSON Schema fragment.
keys:
  - name: icmp.reachable
    kind: metric
    data_type: int
    validation: { minimum: 0, maximum: 1 }
    display_name: ICMP Reachable
    description: ICMP inline probe result (1 = at least one echo returned, 0 = none).
  - name: icmp.rtt_avg
    kind: metric
    data_type: float
    unit: ms
    validation: { minimum: 0 }
    display_name: ICMP RTT (avg)
    description: Average round-trip time over the task's echoes; absent when unreachable.
  - name: tcp.open
    kind: metric
    data_type: int
    validation: { minimum: 0, maximum: 1 }
    display_name: TCP Port Open
    description: TCP-connect probe result (1 = the port accepted a connection, 0 = refused/timeout).
  - name: tcp.connect_time
    kind: metric
    data_type: float
    unit: ms
    validation: { minimum: 0 }
    display_name: TCP Connect Time
    description: Time to establish the TCP connection; absent when the port is closed.
  - name: interface.reachable
    kind: state
    data_type: string
    validation: { enum: [up, down] }
    display_name: Interface Reachable
    description: >-
      Per-interface reachability verdict, the AND of the interface's probe
      results (up = every applicable probe reached the target). A built-in state:
      availability is time_in_state over it. Unknown/stale are read-time
      derivations, not stored values.
  # Declared attribute keys: no kind (not observed), the starter set a field draws from.
  - name: serial_number
    data_type: string
    display_name: Serial number
    description: The manufacturer serial number of the device.
  - name: mac_address
    data_type: string
    validation: { pattern: "^([0-9a-f]{2}:){5}[0-9a-f]{2}$" }
    display_name: MAC address
    description: The primary hardware (MAC) address, lowercase colon-separated.
  - name: firmware_version
    data_type: string
    display_name: Firmware version
    description: The installed firmware or software version.
  - name: model_number
    data_type: string
    display_name: Model number
    description: The manufacturer model number.
