# The official system types, seeded idempotently at boot (ON CONFLICT DO
# UPDATE). A system is the service tree for a space or function; the type
# classifies it. The registry lists alphabetically by display_name. Starter
# set, operator-extensible via the namespace shadow later; tune freely.
system_types:
  - id: meeting-room
    display_name: Meeting Room
  - id: huddle-room
    display_name: Huddle Room
  - id: classroom
    display_name: Classroom
  - id: auditorium
    display_name: Auditorium
  - id: signage
    display_name: Digital Signage
  - id: control-room
    display_name: Control Room
