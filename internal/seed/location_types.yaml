# The official location types, seeded idempotently at boot (ON CONFLICT DO
# UPDATE). The registry lists alphabetically by display_name; that ordering
# does NOT constrain nesting: the location tree stays free-form.
# icon is a glyph key the console resolves to an SVG and renders as the leading
# glyph on every location of this type; an unknown key falls back to map-pin.
# Operator-defined types via the namespace shadow are a later slice.
location_types:
  - id: campus
    display_name: Campus
    icon: landmark
  - id: building
    display_name: Building
    icon: building
  - id: floor
    display_name: Floor
    icon: layers
  - id: room
    display_name: Room
    icon: door-open
