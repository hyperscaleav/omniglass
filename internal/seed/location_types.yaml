# The official location types, seeded idempotently at boot (ON CONFLICT DO
# UPDATE). rank orders the types and gives a soft hierarchy signal; ranks are
# spaced by 10 so a new type (a wing, a zone) can slot between without a
# renumber. rank does NOT constrain nesting: the location tree stays free-form.
# Operator-defined types via the namespace shadow are a later slice.
location_types:
  - id: campus
    display_name: Campus
    rank: 10
  - id: building
    display_name: Building
    rank: 20
  - id: floor
    display_name: Floor
    rank: 30
  - id: room
    display_name: Room
    rank: 40
