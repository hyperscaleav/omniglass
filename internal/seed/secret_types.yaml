# The official secret_types, seeded idempotently at boot (ON CONFLICT DO
# UPDATE). A secret_type is the named shape a secret takes; its fields declare
# per-field secrecy (secret: true is encrypted at rest and masked on display)
# and origin (operator fields are set at creation, lifecycle fields are filled
# by the secret's own machinery in a later slice). Starter set, operator-
# extensible via the namespace shadow later; tune freely.
#
# default_admin_sensitive seeds the create form's admin_sensitive default for a
# type: a device secret (an SNMP community, a device's basic-auth login) is
# operational, so an operator holding the scoped two-token actions may create and
# reveal it; a platform integration credential (an OAuth2 client secret) is
# admin-sensitive, so it stays admin/owner-only even at the same scope. The secret
# row's own value is authoritative; this is only the default the form offers.
secret_types:
  - id: snmp-community
    display_name: SNMP Community
    default_admin_sensitive: false
    fields:
      - { name: community, type: string, secret: true, origin: operator }
  - id: basic-auth
    display_name: Basic Auth
    default_admin_sensitive: false
    fields:
      - { name: username, type: string, secret: false, origin: operator }
      - { name: password, type: string, secret: true,  origin: operator }
  - id: oauth2-client
    display_name: OAuth2 Client
    default_admin_sensitive: true
    fields:
      - { name: client_id,     type: string, secret: false, origin: operator }
      - { name: client_secret, type: string, secret: true,  origin: operator }
