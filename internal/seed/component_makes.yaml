# The official component makes (manufacturers), seeded idempotently at boot.
# A component_make names who built a component (e.g. "Cisco", "Crestron"); a
# later component_model slice will point at one. The registry lists
# alphabetically by display_name. Starter set, operator-extensible later; tune
# freely.
component_makes:
  - id: crestron
    display_name: Crestron
    website: https://www.crestron.com
  - id: biamp
    display_name: Biamp
    website: https://www.biamp.com
  - id: qsc
    display_name: QSC
    website: https://www.qsc.com
  - id: shure
    display_name: Shure
    website: https://www.shure.com
  - id: cisco
    display_name: Cisco
    website: https://www.cisco.com
  - id: extron
    display_name: Extron
    website: https://www.extron.com
  - id: sony
    display_name: Sony
    website: https://www.sony.com
  - id: samsung
    display_name: Samsung
    website: https://www.samsung.com
