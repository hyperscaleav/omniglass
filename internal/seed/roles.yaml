# The five official roles, seeded idempotently at boot (ON CONFLICT DO UPDATE).
# permissions are <resource>:<action> strings; one entry per resource, actions
# comma-separated; a wildcard stands alone. inherits names parent role ids.
# Inheritance, wildcard expansion, and the :read floor are resolved at runtime in
# the role index, not stored expanded here. A release may patch a default here.
# display_name and description are operator-facing (the Roles view and the
# grant-builder tooltips).
roles:
  - id: viewer
    display_name: Viewer
    description: Read-only access to everything. The floor every other role inherits.
    permissions:
      - "*:read"
  - id: operator
    display_name: Operator
    description: >-
      Day-to-day operations: acknowledge, snooze, and resolve alarms, and create
      or edit components, interfaces, tasks, rules, config, secrets, variables, and
      fields.
      Sees and reveals the device secrets in its scope (never the admin-sensitive
      platform credentials). Inherits Viewer.
    inherits: ["viewer"]
    permissions:
      - "component:create,update"
      - "interface:create,update"
      - "task:create,update"
      - "rule:create,update"
      - "config:create,update"
      - "secret:read,reveal,create,update"
      - "variable:create,update"
      - "field:create,update"
      - "alarm:ack,snooze,resolve"
      # files are shared knowledge (not in the sensitive-resource set), so the
      # viewer floor reads ordinary ones; operators upload and delete them. A
      # sensitive file needs the admin tier, which operator does not hold.
      - "file:create,delete"
  - id: deploy
    display_name: Deploy
    description: >-
      Integrator or field tech. Granted at a location with the "under only"
      operator, it builds out and edits everything inside a subtree (add rooms,
      systems, and components) without editing the scope root. No delete. Inherits
      Viewer for the read floor over its subtree.
    inherits: ["viewer"]
    permissions:
      - "location:create,update"
      - "system:create,update"
      - "component:create,update"
      - "secret:read,reveal,create,update"
      - "file:create"
  - id: admin
    display_name: Administrator
    description: >-
      Manages the estate, users, roles, and grants: full create, update, and
      delete on locations, systems, and components, and on principals,
      credentials, grants, and roles. Deliberately NOT the superuser: it cannot
      grant a role above its own tier, so it cannot make itself owner. Inherits
      Operator.
    inherits: ["operator"]
    permissions:
      - "component:delete"
      - "system:create,update,delete"
      - "location:create,update,delete"
      - "principal:*"
      # read (the Users directory) and purge (the irreversible hard delete) are
      # admin-sensitive: three-token permissions that principal:* (two tokens)
      # structurally cannot reach, so only admin (via these explicit grants) and
      # owner (via >) get the directory and the hard delete. Roles and groups gate
      # their directory the same way.
      - "principal:read:admin"
      - "principal:purge:admin"
      - "credential:*"
      # secret:> (not secret:*) so admin reaches the admin-sensitive tier
      # (secret:reveal:admin etc.) a two-token wildcard cannot; an admin-sensitive
      # secret is thus admin/owner-only, while operators hold the two-token actions
      # on the non-sensitive ones.
      - "secret:>"
      # file:> (not file:*) so admin reaches the sensitive tier (file:read:admin
      # etc.) a two-token wildcard cannot; a sensitive file is thus admin/owner-only.
      - "file:>"
      - "variable:*"
      - "field:*"
      - "settings:read,update"
      - "principal_grant:*"
      - "principal_group:*"
      - "principal_group:read:admin"
      - "role:*"
      - "role:read:admin"
      - "audit:read:admin"
      - "datapoint_type:create"
      - "type:create,update,delete"
      - "make:create,update,delete"
      - "tag:*"
      - "unit:create"
      - "event_type:create"
      - "severity_level:create"
      - "source:create"
  - id: owner
    display_name: Owner
    description: >-
      Full control of everything, the break-glass superuser (the tail wildcard,
      so it covers every capability at every tier, including admin-sensitive ones
      and future resources). At least one active owner always exists, and an owner
      account cannot be impersonated.
    permissions:
      - ">"
