# The four official roles, seeded idempotently at boot (ON CONFLICT DO UPDATE).
# permissions are <resource>:<action> strings; one entry per resource, actions
# comma-separated; a wildcard stands alone. inherits names parent role ids.
# Inheritance, wildcard expansion, and the :read floor are resolved at runtime in
# the role index, not stored expanded here. A release may patch a default here.
roles:
  - id: viewer
    permissions:
      - "*:read"
  - id: operator
    inherits: ["viewer"]
    permissions:
      - "component:create,update"
      - "interface:create,update"
      - "task:create,update"
      - "rule:create,update"
      - "config:create,update"
      - "alarm:ack,snooze,resolve"
  - id: deploy
    # An integrator / field tech role: granted at a location with the
    # subtree_excl_root operator, it can add a room and populate it with systems and
    # components (and edit those children), but cannot modify the root of its own
    # scope. Delete is deliberately
    # off the initial cut. Inherits viewer for the read floor over its subtree.
    inherits: ["viewer"]
    permissions:
      - "location:create,update"
      - "system:create,update"
      - "component:create,update"
  - id: admin
    inherits: ["operator"]
    permissions:
      - "component:delete"
      - "system:create,update,delete"
      - "location:create,update,delete"
      - "principal:*"
      - "credential:*"
      - "principal_grant:*"
      - "role:*"
      - "datapoint_type:create"
      - "tag:create"
      - "unit:create"
      - "event_type:create"
      - "severity_level:create"
      - "source:create"
  - id: owner
    permissions:
      - "*:*"
