# The official component types, seeded idempotently at boot. A component is a
# device or element in a system; the type classifies it. The registry lists
# alphabetically by display_name. Starter set, operator-extensible later; tune
# freely.
component_types:
  - id: display
    display_name: Display
  - id: camera
    display_name: Camera
  - id: microphone
    display_name: Microphone
  - id: speaker
    display_name: Speaker
  - id: dsp
    display_name: Audio DSP
  - id: codec
    display_name: Codec
  - id: control-processor
    display_name: Control Processor
  - id: touch-panel
    display_name: Touch Panel
  - id: switcher
    display_name: Switcher
  - id: amplifier
    display_name: Amplifier
  - id: sensor
    display_name: Sensor
